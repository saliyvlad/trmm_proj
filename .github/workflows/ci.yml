name: TRMM CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ libopenblas-dev

    - name: Create build directory
      run: mkdir build

    - name: Run CMake
      run: |
        cd build
        cmake ..

    - name: Build project
      run: |
        cd build
        cmake --build .

    - name: Run tests
      run: |
        cd build
        ./test_trmm

    - name: Run benchmark
      run: |
        cd build
        ./bench_trmm